<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraud Shield Guard – Activity Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    body {margin:0;padding:0;font-family:'Outfit',sans-serif;background:#0a0a0a;color:#e0e0e0;}
    .container {max-width:960px;margin:auto;padding:24px;}
    h1 {font-size:2rem;color:#ff4081;text-align:center;}
    .card {background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;margin:12px 0;backdrop-filter:blur(8px);}
    .card h2 {font-size:1.2rem;color:#ff80ab; margin:0 0 8px;}
    .badge {display:inline-block;background:#ff4081;color:#000;padding:2px 6px;border-radius:4px;font-size:0.75rem;margin-left:8px;}
    .log-list {list-style:none;padding:0;}
    .log-item {border-bottom:1px solid rgba(255,255,255,0.08);padding:8px 0;}
    .log-item:last-child {border:none;}
    .timestamp {font-size:0.75rem;color:#888;}
    .status {font-weight:600;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Fraud Shield Guard Activity</h1>
    <div class="card">
      <h2>Recent Threats <span id="stats" class="badge"></span></h2>
      <ul id="logList" class="log-list"></ul>
    </div>
  </div>
  <script>
    async function loadThreats(){
      try{
        const res = await fetch('/api/threats');
        const data = await res.json();
        if(!data.success){throw new Error('Failed');}
        const statsSpan = document.getElementById('stats');
        statsSpan.textContent = `Blocked: ${data.stats.blocked}, Scanned: ${data.stats.scanned}`;
        const list = document.getElementById('logList');
        list.innerHTML = '';
        data.threats.slice(0,20).forEach(t=>{
          const li = document.createElement('li');
          li.className='log-item';
          li.innerHTML = `<div><strong>${t.type.toUpperCase()}</strong> – <span class="status">${t.status}</span></div>`+
                         `<div class="timestamp">${new Date(t.timestamp).toLocaleString()}</div>`+
                         `<div>Score: ${t.score}</div>`+
                         `<div>Indicators: ${t.indicators.map(i=>i.id).join(', ')}</div>`;
          list.appendChild(li);
        });
      }catch(e){console.error(e);}
    }
    loadThreats();
    // Auto‑refresh every 10 seconds
    setInterval(loadThreats,10000);
  </script>
</body>
</html>
