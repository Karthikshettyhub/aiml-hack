<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft Rewards – Claim Your Gift</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--bg-dark); color: var(--text-primary); font-family: 'Outfit', sans-serif; }
    .phish-card { max-width: 420px; margin: 60px auto; background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); border-radius: 12px; padding: 24px; box-shadow: 0 0 28px rgba(0,240,255,0.25); }
    .phish-header { text-align:center; margin-bottom:20px; }
    .phish-header img { width:80px; }
    .urgent-banner { background: var(--neon-pink); color:#fff; padding:8px 12px; border-radius:6px; text-align:center; font-weight:600; margin-bottom:16px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%{opacity:0.9;} 50%{opacity:0.6;} 100%{opacity:0.9;} }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; font-size:0.78rem; margin-bottom:4px; }
    .form-group input { width:100%; padding:8px; border:none; border-radius:4px; background: rgba(255,255,255,0.08); color:#fff; }
    .submit-btn { width:100%; padding:10px; background: var(--neon-pink); color:#fff; border:none; border-radius:6px; font-size:0.9rem; cursor:pointer; transition:transform 0.2s; }
    .submit-btn:hover { transform:scale(1.02); }
    .countdown { font-size:0.85rem; margin-top:4px; color: var(--neon-amber); }
  </style>
</head>
<body>
  <div class="phish-card">
    <div class="phish-header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft" />
      <h2>Microsoft Rewards</h2>
      <p>Claim your <strong>₹5,000 Cash Reward</strong> now!</p>
    </div>
    <div class="urgent-banner">Offer expires in <span id="timer">02:00</span> minutes</div>
    <form id="phish-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label for="upi">UPI ID</label>
        <input type="text" id="upi" placeholder="john@oksupport" required />
      </div>
      <div class="form-group">
        <label for="amount">Amount (₹)</label>
        <input type="number" id="amount" value="5000" readonly />
      </div>
      <div class="form-group">
        <label for="note">Payment Note</label>
        <input type="text" id="note" value="Reward Claim" readonly />
      </div>
      <button type="submit" class="submit-btn"><i class="fa-solid fa-bolt"></i> Proceed Payment</button>
    </form>
    <p class="countdown">Hurry! This reward will be withdrawn after the timer ends.</p>
  </div>

  <!-- Countdown script -->
  <script>
    // Simple 2‑minute countdown
    const timerEl = document.getElementById('timer');
    let remaining = 120; // seconds
    const interval = setInterval(() => {
      const mins = String(Math.floor(remaining / 60)).padStart(2, '0');
      const secs = String(remaining % 60).padStart(2, '0');
      timerEl.textContent = `${mins}:${secs}`;
      if (remaining <= 0) {
        clearInterval(interval);
        timerEl.textContent = '00:00';
        // Optionally disable form after expiry
        document.getElementById('phish-form').querySelector('button').disabled = true;
      }
      remaining--;
    }, 1000);
  </script>

  <!-- Payment handling – uses existing app.js globals -->
  <script>
    // Ensure the global functions from app.js are loaded (app.js is already included in index.html)
    // This page also loads app.js automatically because it lives in the same public folder.
    // If not, we can import it explicitly.
    // Attach submit handler
    document.getElementById('phish-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        upiId: document.getElementById('upi').value.trim(),
        amount: parseFloat(document.getElementById('amount').value),
        merchantName: 'Microsoft Rewards',
        note: document.getElementById('note').value.trim(),
        repeatedAttempts: 1,
        originUrl: window.location.href
      };

      // Disable button & show spinner effect
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Processing`;

      try {
        const res = await fetch('/api/analyze-transaction', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success && data.analysis.isSuspicious) {
          // Use the existing interceptor HUD from app.js
          openInterceptorOverlay({
            type: 'transaction',
            input: payload,
            score: data.analysis.score,
            indicators: data.analysis.indicators,
            aiBrief: data.aiBrief
          });
        } else {
          alert('Payment appears safe – demo will still not execute any real transaction.');
        }
      } catch (err) {
        console.error('Phish page error:', err);
        alert('Error contacting backend.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-bolt"></i> Proceed Payment`;
      }
    });
  </script>
</body>
</html>
